<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultX</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />

<body class="theme-dark">
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-logo">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        VaultX
      </span>
    </div>
    <div class="titlebar-actions">
      <button class="tb-btn" id="tbMin" title="Minimizza" aria-label="Minimizza">&minus;</button>
      <button class="tb-btn" id="tbMax" title="Massimizza" aria-label="Massimizza">&#9633;</button>
      <button class="tb-btn tb-close" id="tbClose" title="Chiudi" aria-label="Chiudi">&times;</button>
    </div>
  </div>

  <main id="app" class="app-root"></main>

  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script src="js/components/toast.js"></script>
  <script src="js/components/strength.js"></script>
  <script src="js/components/search.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/setup.js"></script>
  <script src="js/pages/unlock.js"></script>
  <script src="js/pages/vault.js"></script>
  <script src="js/pages/entry.js"></script>
  <script src="js/pages/generator.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>

</html>
